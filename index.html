<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسن ٹریڈنگ کمپنی - ایڈوانس سسٹم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@500;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root{
    --paper:#F3ECD8; --paper-dark:#EAE1C6; --ink:#23301F; --ink-soft:#4A5442;
    --rule-red:#A63D40; --green:#2F6B4F; --green-dark:#234F3B;
    --mustard:#D9A441; --mustard-dark:#B9822B;
    --font-ur:'Noto Nastaliq Urdu', 'Noto Sans Arabic', serif;
    --font-num:'JetBrains Mono', monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:var(--font-ur); }
  body{ background:var(--paper); color:var(--ink); line-height:1.6; padding:10px; }
  .container{ max-width:1100px; margin:0 auto; background:var(--paper); border:2px solid var(--ink); padding:15px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
  header{ text-align:center; border-bottom:3px double var(--ink); padding-bottom:10px; margin-bottom:15px; }
  header h1{ font-size:28px; color:var(--green-dark); margin-bottom:5px; }
  header p{ font-size:14px; color:var(--ink-soft); }
  .nav-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:15px; border-bottom:1px solid var(--ink-soft); pb:10px; }
  .tab-btn{ background:var(--paper-dark); border:1px solid var(--ink); padding:6px 12px; cursor:pointer; font-size:14px; border-radius:4px; font-weight:bold; }
  .tab-btn.active{ background:var(--green); color:#fff; border-color:var(--green-dark); }
  .section{ display:none; }
  .section.active{ display:block; }
  .card{ background:#fff; border:1px solid var(--ink-soft); padding:12px; margin-bottom:15px; border-radius:6px; }
  .form-group{ margin-bottom:10px; }
  label{ display:block; font-size:13px; margin-bottom:4px; font-weight:bold; }
  input, select, textarea{ width:100%; padding:8px; border:1px solid var(--ink-soft); border-radius:4px; font-size:14px; background:#fafafa; }
  .btn{ background:var(--green); color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px; }
  .btn:hover{ background:var(--green-dark); }
  .btn-danger{ background:var(--rule-red); }
  table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
  th, td{ border:1px solid var(--ink-soft); padding:6px 8px; text-align:center; }
  th{ background:var(--paper-dark); }
  .sync-status{ font-size:12px; padding:4px 8px; border-radius:4px; display:inline-block; margin-top:5px; }
  .sync-online{ background:#d4edda; color:#155724; }
  .sync-loading{ background:#fff3cd; color:#856404; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>حسن ٹریڈنگ کمپنی</h1>
    <p>ایڈوانس گلوبل ڈیٹا بیس ڈیش بورڈ</p>
    <div id="syncBadge" class="sync-status sync-loading">ڈیٹا سنک ہو رہا ہے...</div>
  </header>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('productsTab')">پروڈکٹس</button>
    <button class="tab-btn" onclick="switchTab('shopkeepersTab')">دکاندار / روٹس</button>
    <button class="tab-btn" onclick="switchTab('ordersTab')">آرڈرز</button>
  </div>

  <div id="productsTab" class="section active">
    <div class="card">
      <h3>نئی پروڈکٹ شامل کریں</h3>
      <div class="form-group">
        <label>پروڈکٹ کا نام:</label>
        <input type="text" id="npName" placeholder="نام درج کریں">
      </div>
      <div class="form-group">
        <label>یونٹ (مثلاً: پیس / کارٹن):</label>
        <input type="text" id="npUnit" placeholder="پیس">
      </div>
      <div class="form-group">
        <label>خریداری قیمت (Buying Price):</label>
        <input type="number" id="npBuyingPrice" value="0">
      </div>
      <div class="form-group">
        <label>فروخت قیمت (Selling Price):</label>
        <input type="number" id="npSellingPrice" value="0">
      </div>
      <button class="btn" onclick="addProduct()">پروڈکٹ سیو کریں</button>
    </div>

    <div class="card">
      <h3>تمام پروڈکٹس کی فہرست</h3>
      <table>
        <thead>
          <tr>
            <th>آئی ڈی</th>
            <th>نام</th>
            <th>یونٹ</th>
            <th>خریداری قیمت</th>
            <th>فروخت قیمت</th>
            <th>ایکشن</th>
          </tr>
        </thead>
        <tbody id="productsTableBody">
          </tbody>
      </table>
    </div>
  </div>

  <div id="shopkeepersTab" class="section">
    <div class="card">
      <h3>نیا روٹ شامل کریں</h3>
      <div class="form-group">
        <input type="text" id="newRouteName" placeholder="روٹ کا نام">
      </div>
      <button class="btn" onclick="addRoute()">روٹ شامل کریں</button>
    </div>

    <div class="card">
      <h3>نیا دکاندار شامل کریں</h3>
      <div class="form-group">
        <label>دکان کا نام:</label>
        <input type="text" id="skName">
      </div>
      <div class="form-group">
        <label>فون نمبر:</label>
        <input type="text" id="skPhone">
      </div>
      <div class="form-group">
        <label>روٹ منتخب کریں:</label>
        <select id="skRouteSelect"></select>
      </div>
      <button class="btn" onclick="addShopkeeper()">دکاندار سیو کریں</button>
    </div>
  </div>

  <div id="ordersTab" class="section">
    <div class="card">
      <h3>آرڈرز کی ہسٹری</h3>
      <div id="ordersList">ڈیٹا لوڈ ہو رہا ہے...</div>
    </div>
  </div>
</div>

<script>
  // Google Apps Script Web App Deployment URL
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxaw7C38weJrUsO_nVueOgyP5AFPZRR8S097iYF8eLtvKMj8hbHc8-J0J7QHiMLA8VTQ/exec";

  let state = {
    products: [],
    shopkeepers: [],
    routes: [],
    orders: []
  };

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
  }

  function updateSyncBadge(status, text) {
    const badge = document.getElementById('syncBadge');
    badge.className = `sync-status ${status}`;
    badge.innerText = text;
  }

  // Global Data Fetch from Google Sheets / Drive API
  async function loadGlobalData() {
    updateSyncBadge('sync-loading', 'گلوبل ڈیٹا سنک ہو رہا ہے...');
    try {
      const res = await fetch(SCRIPT_URL + "?action=getData");
      if (res.ok) {
        const data = await res.json();
        if (data) {
          state.products = data.products || [];
          state.shopkeepers = data.shopkeepers || [];
          state.routes = data.routes || [];
          state.orders = data.orders || [];
        }
        updateSyncBadge('sync-online', 'گلوبل ڈیٹا آن لائن ہے ✓');
        render();
      } else {
        throw new Error('API Error');
      }
    } catch (e) {
      console.warn("Global Fetch Failed. Using local cache fallback.", e);
      updateSyncBadge('sync-loading', 'لوکل موڈ (آن لائن سنکنگ جاری...)');
      const local = localStorage.getItem('hassan_trading_state');
      if (local) state = JSON.parse(local);
      render();
    }
  }

  // Global Sync to Google Sheets / Drive API
  async function syncToDrive(key, value) {
    localStorage.setItem('hassan_trading_state', JSON.stringify(state));
    updateSyncBadge('sync-loading', 'تغیرات بھیجے جا رہے ہیں...');
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'saveData', key: key, value: value, fullState: state })
      });
      updateSyncBadge('sync-online', 'تمام آلات پر محفوظ ہو گیا ✓');
    } catch (e) {
      console.error("Save failed:", e);
      updateSyncBadge('sync-loading', 'آف لائن سیو (دوبارہ کوشش کی جائے گی)');
    }
  }

  function switchTab(tabId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
  }

  async function addProduct() {
    const name = document.getElementById('npName').value.trim();
    const unit = document.getElementById('npUnit').value.trim();
    const buyingPrice = Number(document.getElementById('npBuyingPrice').value) || 0;
    const sellingPrice = Number(document.getElementById('npSellingPrice').value) || 0;

    if (!name) return alert('نام درج کرنا ضروری ہے');

    const newProd = {
      id: uid(),
      name,
      unit: unit || 'پیس',
      buyingPrice,
      sellingPrice
    };

    state.products.push(newProd);
    render();
    await syncToDrive('products', state.products);
    
    document.getElementById('npName').value = '';
    document.getElementById('npBuyingPrice').value = '0';
    document.getElementById('npSellingPrice').value = '0';
  }

  async function deleteProduct(id) {
    if (confirm('کیا آپ اس پروڈکٹ کو حذف کرنا چاہتے ہیں؟')) {
      state.products = state.products.filter(p => p.id !== id);
      render();
      await syncToDrive('products', state.products);
    }
  }

  async function addRoute() {
    const name = document.getElementById('newRouteName').value.trim();
    if (!name) return alert('روٹ کا نام لکھیں');
    state.routes.push({ id: uid(), name });
    render();
    await syncToDrive('routes', state.routes);
    document.getElementById('newRouteName').value = '';
  }

  async function addShopkeeper() {
    const name = document.getElementById('skName').value.trim();
    const phone = document.getElementById('skPhone').value.trim();
    const routeId = document.getElementById('skRouteSelect').value;
    if (!name || !routeId) return alert('نام اور روٹ ضروری ہے');

    state.shopkeepers.push({ id: uid(), name, phone, routeId });
    render();
    await syncToDrive('shopkeepers', state.shopkeepers);
    document.getElementById('skName').value = '';
    document.getElementById('skPhone').value = '';
  }

  function render() {
    // Render Products Table
    const pBody = document.getElementById('productsTableBody');
    pBody.innerHTML = state.products.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.unit}</td>
        <td>${p.buyingPrice}</td>
        <td>${p.sellingPrice}</td>
        <td><button class="btn btn-danger" onclick="deleteProduct('${p.id}')">حذف</button></td>
      </tr>
    `).join('') || '<tr><td colspan="6">کوئی پروڈکٹ موجود نہیں</td></tr>';

    // Render Routes Select
    const rSelect = document.getElementById('skRouteSelect');
    rSelect.innerHTML = state.routes.map(r => `<option value="${r.id}">${r.name}</option>`).join('') || '<option value="">کوئی روٹ نہیں</option>';
  }

  // Initial Load & Automatic Real-Time Polling every 10 seconds
  window.addEventListener('DOMContentLoaded', () => {
    loadGlobalData();
    setInterval(loadGlobalData, 10000); // 10 Sec Sync Loop for dynamic updates across devices
  });
</script>
</body>
</html>
