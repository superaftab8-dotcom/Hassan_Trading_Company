<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسن ٹریڈنگ کمپنی - ایڈوانس سسٹم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@500;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root{
    --paper:#F3ECD8; --paper-dark:#EAE1C6; --ink:#23301F; --ink-soft:#4A5442;
    --rule-red:#A63D40; --green:#2F6B4F; --green-dark:#234F3B;
    --mustard:#D9A441; --mustard-dark:#B9822B; --white:#FFFDF7; --muted:#8A8370; --danger:#A63D40;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 85% 8%, rgba(255,255,255,0.35), transparent 40%),var(--paper);color:var(--ink);font-family:'Noto Sans Arabic',sans-serif;min-height:100vh;}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 60px;}
  .signboard{background:var(--green-dark);color:var(--white);border-radius:14px;padding:20px 20px 18px;position:relative;overflow:hidden;box-shadow:0 6px 0 rgba(0,0,0,0.12);margin-bottom:16px;}
  .signboard h1{font-family:'Noto Nastaliq Urdu',serif;font-weight:700;font-size:32px;margin:0 0 8px;line-height:1.6;}
  .signboard p{margin:0;color:#D9CFA8;font-size:14px;}
  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{flex:1;min-width:75px;text-align:center;padding:10px 6px;background:var(--paper-dark);border:2px solid transparent;border-radius:10px 10px 4px 4px;font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer;}
  .tab.active{background:var(--white);border-color:var(--green);color:var(--green-dark);box-shadow:0 3px 0 rgba(0,0,0,0.06);}
  .ledger-card{background:var(--white);border-radius:10px;padding:16px 22px 16px 16px;margin-bottom:14px;position:relative;box-shadow:0 2px 6px rgba(0,0,0,0.06);}
  .section-title{font-family:'Noto Nastaliq Urdu',serif;font-weight:700;font-size:22px;color:var(--green-dark);margin:0 0 12px;}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  input[type=text], input[type=tel], input[type=number], select{width:100%;padding:10px 11px;border:1.5px solid #DED4B4;border-radius:8px;font-size:15px;background:var(--white);color:var(--ink);margin-bottom:12px;}
  .search-box{border-color:var(--green) !important; background:#F8F6EF !important;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;padding:11px 16px;font-weight:700;font-size:15px;cursor:pointer;}
  .btn-primary{background:var(--green);color:var(--white);}
  .btn-danger{background:transparent;color:var(--danger);border:1.5px solid var(--danger);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 10px;font-size:12.5px;}
  .prod-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed #E1D6B0;}
  .prod-img{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid #DED4B4;background:#EEE;}
  .prod-name{flex:1;min-width:0;}
  .prod-name .n{font-weight:600;font-size:15.5px;}
  .prod-name .u{font-size:12.5px;color:var(--muted);}
  .price{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13.5px;color:var(--ink-soft);min-width:72px;text-align:center;direction:ltr;}
  .stepper{display:flex;align-items:center;gap:6px;direction:ltr;}
  .stepper button{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--green);background:var(--white);color:var(--green-dark);font-size:17px;font-weight:700;cursor:pointer;}
  .stepper input{width:44px;text-align:center;padding:6px 2px;margin:0;font-family:'JetBrains Mono',monospace;font-weight:700;}
  .cart-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;margin-top:6px;border-top:2px solid var(--rule-red);}
  .cart-total .amt{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--green-dark);direction:ltr;}
  .empty{text-align:center;padding:30px 14px;color:var(--muted);font-size:14.5px;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--green-dark);color:var(--white);padding:12px 20px;border-radius:10px;font-weight:600;font-size:14.5px;box-shadow:0 6px 20px rgba(0,0,0,0.25);z-index:50;opacity:0;pointer-events:none;transition:all .25s ease;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .sync-indicator{position:fixed;top:10px;left:10px;background:rgba(47,107,79,0.9);color:#FFF;padding:4px 12px;border-radius:20px;font-size:11px;z-index:100;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:8px;height:8px;background:#00FF66;border-radius:50%;display:inline-block;}
  .sync-dot.syncing{background:#FFCC00;animation:blink 0.8s infinite;}
  .sync-dot.error{background:#FF3333;}
  @keyframes blink{0%{opacity:0.2;} 50%{opacity:1;} 100%{opacity:0.2;}}
</style>
</head>
<body>

<div class="sync-indicator">
  <span class="sync-dot" id="syncDot"></span>
  <span id="syncText">ریئل ٹائم سنک آن ہے</span>
</div>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// UPDATED APP SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywVXcytc3S0VUcs3DF_LuSSsmKZagm-YbjFjzvtGEBuHHPCbPg8xRJqH2CRfyHBP3rMQ/exec";
const DEFAULT_IMG = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 24 24' fill='none' stroke='%232F6B4F' stroke-width='1.5'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='8.5' cy='8.5' r='1.5'/><path d='M21 15l-5-5L5 21'/></svg>";

let state = {
  view: 'shop',
  products: [],
  orders: [],
  shopkeepers: [],
  routes: [],
  salesmen: [],
  cart: {},
  profile: { shopName:'', phone:'', routeId:'', salesmanId:'' },
  loading: false,
  ownerTab: 'sales',
  selectedRouteFilter: 'all',
  isOwnerAuthenticated: false,
  ownerPin: '1234',
  searchProdQuery: ''
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n){ return 'Rs ' + Number(n||0).toLocaleString('en-IN'); }

// REAL-TIME AUTO SYNC (FETCH FROM GOOGLE SHEET)
async function fetchCloudData() {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(dot) dot.className = 'sync-dot syncing';
  if(txt) txt.textContent = "ڈیٹا سنک ہو رہا ہے...";

  try {
    const res = await fetch(`${SCRIPT_URL}?action=getData`);
    const data = await res.json();
    
    if(data) {
      if(data.products && data.products.length > 0) state.products = data.products;
      if(data.orders) state.orders = data.orders;
      if(data.routes) state.routes = data.routes;
      if(data.shopkeepers) state.shopkeepers = data.shopkeepers;
      if(data.salesmen) state.salesmen = data.salesmen;

      localStorage.setItem('products', JSON.stringify(state.products));
      localStorage.setItem('orders', JSON.stringify(state.orders));
      localStorage.setItem('routes', JSON.stringify(state.routes));
      localStorage.setItem('shopkeepers', JSON.stringify(state.shopkeepers));
      localStorage.setItem('salesmen', JSON.stringify(state.salesmen));

      render();
    }
    if(dot) dot.className = 'sync-dot';
    if(txt) txt.textContent = "ریئل ٹائم سنک فعال";
  } catch (err) {
    console.error("Cloud Fetch Error:", err);
    if(dot) dot.className = 'sync-dot error';
    if(txt) txt.textContent = "آف لائن / لوکل موڈ";
  }
}

// SAVE TO CLOUD (POST TO GOOGLE SHEET)
async function syncSave(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
  const dot = document.getElementById('syncDot');
  if(dot) dot.className = 'sync-dot syncing';

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "saveData", key: key, data: val })
    });
    setTimeout(fetchCloudData, 1000); // Immediate refresh for fast sync
  } catch(e) {
    console.error("Sync Save Error:", e);
  }
}

function loadLocalBackup(){
  state.products = JSON.parse(localStorage.getItem('products') || '[]');
  state.orders = JSON.parse(localStorage.getItem('orders') || '[]');
  state.routes = JSON.parse(localStorage.getItem('routes') || '[]');
  state.shopkeepers = JSON.parse(localStorage.getItem('shopkeepers') || '[]');
  state.salesmen = JSON.parse(localStorage.getItem('salesmen') || '[]');
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function cartTotal(){
  let total = 0;
  for(const pid in state.cart){
    const qty = state.cart[pid];
    const prod = state.products.find(x=>x.id===pid);
    if(prod && qty>0) total += (prod.sellingPrice || prod.price || 0) * qty;
  }
  return total;
}

function submitOrder(){
  const items = [];
  for(const pid in state.cart){
    const qty = state.cart[pid];
    const prod = state.products.find(x=>x.id===pid);
    if(prod && qty>0) {
      items.push({ productId: prod.id, name: prod.name, unit: prod.unit, price: prod.sellingPrice || prod.price || 0, qty });
    }
  }
  if(items.length===0){ showToast('آئٹمز منتخب کریں'); return; }
  if(!state.profile.shopName.trim()){ showToast('دکان کا نام درج کریں'); return; }

  const order = {
    id: uid(), shopName: state.profile.shopName.trim(), phone: state.profile.phone.trim(),
    items, total: cartTotal(), status: 'pending', createdAt: Date.now()
  };

  state.orders.unshift(order);
  syncSave('orders', state.orders);
  state.cart = {};
  showToast('آرڈر محفوظ ہو گیا ✓');
  render();
}

function render(){
  const app = document.getElementById('app');
  let html = `
    <div class="signboard">
      <h1>حسن ٹریڈنگ کمپنی</h1>
      <p>ریئل ٹائم کلاؤڈ سنکڈ سسٹم</p>
    </div>
    <div class="tabs">
      <div class="tab ${state.view==='shop'?'active':''}" onclick="state.view='shop';render();">🛒 دکاندار</div>
      <div class="tab ${state.view==='salesman'?'active':''}" onclick="state.view='salesman';render();">👨‍💼 سیلز مین</div>
      <div class="tab ${state.view==='owner'?'active':''}" onclick="state.view='owner';render();">🔒 مالک</div>
    </div>
  `;

  if(state.view === 'shop' || state.view === 'salesman') {
    html += `
      <div class="ledger-card">
        <div class="section-title">آرڈر بکنگ</div>
        <label>دکان کا نام</label>
        <input type="text" value="${state.profile.shopName}" oninput="state.profile.shopName=this.value" placeholder="دکان کا نام">
        <label>فون نمبر</label>
        <input type="tel" value="${state.profile.phone}" oninput="state.profile.phone=this.value" placeholder="03xx-xxxxxxx">
      </div>
      <div class="ledger-card">
        <div class="section-title">پروڈکٹس</div>
        ${state.products.map(p => `
          <div class="prod-row">
            <img src="${p.image || DEFAULT_IMG}" class="prod-img">
            <div class="prod-name">
              <div class="n">${p.name}</div>
              <div class="u">فی ${p.unit}</div>
            </div>
            <div class="price">${fmt(p.sellingPrice || p.price)}</div>
            <div class="stepper">
              <button onclick="state.cart['${p.id}'] = Math.max(0, (state.cart['${p.id}']||0)-1); render();">−</button>
              <input type="number" readonly value="${state.cart[p.id] || 0}">
              <button onclick="state.cart['${p.id}'] = (state.cart['${p.id}']||0)+1; render();">+</button>
            </div>
          </div>
        `).join('')}
        <div class="cart-total">
          <div>کل رقم:</div>
          <div class="amt">${fmt(cartTotal())}</div>
        </div>
        <button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="submitOrder()">آرڈر محفوظ کریں</button>
      </div>
    `;
  } else {
    html += `
      <div class="ledger-card">
        <div class="section-title">مالک کنٹرول پینل</div>
        <p>مجموعی آرڈرز: <b>${state.orders.length}</b></p>
        <p>مجموعی پروڈکٹس: <b>${state.products.length}</b></p>
        <button class="btn btn-primary btn-block" onclick="fetchCloudData()">فوراً ڈرائیو سے ریفریش کریں 🔄</button>
      </div>
    `;
  }

  app.innerHTML = html;
}

// Initial Run and Auto-polling every 5 seconds
loadLocalBackup();
fetchCloudData();
setInterval(fetchCloudData, 5000);
</script>
</body>
</html>
