<style>
  :root{
    --paper:#F3ECD8; --paper-dark:#EAE1C6; --ink:#23301F; --ink-soft:#4A5442;
    --rule-red:#A63D40; --green:#2F6B4F; --green-dark:#234F3B;
    --mustard:#D9A441; --mustard-dark:#B9822B; --white:#FFFDF7; --muted:#8A8370; --danger:#A63D40;
    --blue:#2B6CB0;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 85% 8%, rgba(255,255,255,0.35), transparent 40%),var(--paper);color:var(--ink);font-family:'Noto Sans Arabic',sans-serif;min-height:100vh;}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 60px;}
  .signboard{background:var(--green-dark);color:var(--white);border-radius:14px;padding:20px 20px 18px;position:relative;overflow:hidden;box-shadow:0 6px 0 rgba(0,0,0,0.12);margin-bottom:16px;}
  .signboard::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 14px);}
  .signboard h1{font-family:'Noto Nastaliq Urdu',serif;font-weight:700;font-size:32px;margin:0 0 8px;line-height:1.6;position:relative;}
  .signboard p{margin:0;color:#D9CFA8;font-size:14px;position:relative;}
  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{flex:1;min-width:75px;text-align:center;padding:10px 6px;background:var(--paper-dark);border:2px solid transparent;border-radius:10px 10px 4px 4px;font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer;transition:all .15s ease;}
  .tab.active{background:var(--white);border-color:var(--green);color:var(--green-dark);box-shadow:0 3px 0 rgba(0,0,0,0.06);}
  .ledger-card{background:var(--white);border-radius:10px;padding:16px 22px 16px 16px;margin-bottom:14px;position:relative;box-shadow:0 2px 6px rgba(0,0,0,0.06);}
  .ledger-card::before{content:"";position:absolute;right:12px;top:10px;bottom:10px;width:2px;background:var(--rule-red);opacity:0.55;}
  .section-title{font-family:'Noto Nastaliq Urdu',serif;font-weight:700;font-size:22px;color:var(--green-dark);margin:0 0 12px;}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  input[type=text], input[type=tel], input[type=number], input[type=password], select, input[type=file]{width:100%;padding:10px 11px;border:1.5px solid #DED4B4;border-radius:8px;font-family:'Noto Sans Arabic',sans-serif;font-size:15px;background:var(--white);color:var(--ink);margin-bottom:12px;}
  .search-box{border-color:var(--green) !important; background:#F8F6EF !important; font-weight:600;}
  input:focus,select:focus{outline:2px solid var(--green);outline-offset:1px;border-color:var(--green);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;padding:11px 16px;font-family:'Noto Sans Arabic',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:transform .1s ease;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--green);color:var(--white);}
  .btn-primary:hover{background:var(--green-dark);}
  .btn-ghost{background:transparent;color:var(--green-dark);border:1.5px solid var(--green);}
  .btn-danger{background:transparent;color:var(--danger);border:1.5px solid var(--danger);}
  .btn-mustard{background:var(--mustard);color:#3A2A08;}
  .btn-excel{background:#1D6F42;color:#FFF;}
  .btn-pdf{background:#B30000;color:#FFF;}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 10px;font-size:12.5px;}
  .prod-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed #E1D6B0;}
  .prod-row:last-child{border-bottom:none;}
  .prod-img{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid #DED4B4;background:#EEE;}
  .prod-name{flex:1;min-width:0;}
  .prod-name .n{font-weight:600;font-size:15.5px;}
  .prod-name .u{font-size:12.5px;color:var(--muted);}
  .price-details{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .price{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13.5px;color:var(--ink-soft);min-width:72px;text-align:center;direction:ltr;}
  .profit-badge{font-size:11px;background:#DDEEE2;color:var(--green-dark);padding:2px 6px;border-radius:4px;font-weight:bold;display:inline-block;margin-top:2px;}
  .stepper{display:flex;align-items:center;gap:6px;direction:ltr;}
  .stepper button{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--green);background:var(--white);color:var(--green-dark);font-size:17px;font-weight:700;cursor:pointer;line-height:1;}
  .stepper input{width:44px;text-align:center;padding:6px 2px;margin:0;font-family:'JetBrains Mono',monospace;font-weight:700;}
  .cart-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;margin-top:6px;border-top:2px solid var(--rule-red);}
  .cart-total .amt{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--green-dark);direction:ltr;}
  .empty{text-align:center;padding:30px 14px;color:var(--muted);font-size:14.5px;}
  .order-card{background:var(--white);border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);position:relative;overflow:hidden;}
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .shop-name{font-weight:700;font-size:16.5px;}
  .badge{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .badge.pending{background:#FCEFD3;color:var(--mustard-dark);}
  .badge.delivered{background:#DDEEE2;color:var(--green-dark);}
  .item-list{font-size:14px;color:var(--ink-soft);margin:8px 0;line-height:1.8;}
  .item-list .it{display:flex;justify-content:space-between;align-items:center;}
  .item-list .it b{font-family:'JetBrains Mono',monospace;direction:ltr;}
  .order-total{display:flex;justify-content:space-between;font-weight:700;padding-top:8px;border-top:1px dashed #E1D6B0;margin-top:6px;}
  .order-total .amt{font-family:'JetBrains Mono',monospace;color:var(--green-dark);direction:ltr;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--green-dark);color:var(--white);padding:12px 20px;border-radius:10px;font-weight:600;font-size:14.5px;box-shadow:0 6px 20px rgba(0,0,0,0.25);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  .summary-box{background:var(--paper);border-radius:9px;padding:10px;text-align:center;}
  .summary-box .num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--green-dark);direction:ltr;}
  .summary-box .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .shop-item-card{background:var(--paper);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #DED4B4;}
  .route-chip-list{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;}
  .route-chip{padding:6px 14px;background:var(--paper-dark);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid #DED4B4;}
  .route-chip.active{background:var(--green);color:var(--white);border-color:var(--green);}
  .schedule-box{background:#E8F0EA;border-right:4px solid var(--green);padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13.5px;}
  .edit-box{background:var(--paper);padding:10px;border-radius:8px;margin-top:6px;margin-bottom:12px;}
  .preview-img{width:60px;height:60px;border-radius:8px;object-fit:cover;margin-top:6px;border:1px solid #CCC;}
  .export-btns{display:flex;gap:8px;margin-top:12px;}
  .cart-review-box{background:#F8F6EF;border:1.5px dashed var(--green);border-radius:10px;padding:12px;margin:12px 0;}
</style>
</head>

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function sortProductsAlphabetically(productsArray){
  return productsArray.sort((a, b) => a.name.localeCompare(b.name, 'en', { sensitivity: 'base' }));
}

async function loadAll() {
  let sharedData = {};
  try {
    const response = await fetch(`${GOOGLE_SHEET_WEB_APP_URL}?action=getData`, {
      method: "GET"
    });

    const rawText = await response.text();
    if (response.ok) {
      try {
        sharedData = JSON.parse(rawText);
      } catch (jsonErr) {
        console.warn("Raw response parsing failed, fallback active.");
      }
    }
  } catch (e) {
    console.error('Shared data load failed', e);
  }

  const readSavedValue = (key, fallback) => {
    if(sharedData && Object.prototype.hasOwnProperty.call(sharedData, key) && sharedData[key] !== null && sharedData[key] !== undefined) {
      return sharedData[key];
    }
    try {
      const localValue = localStorage.getItem(key);
      return localValue === null ? fallback : JSON.parse(localValue);
    } catch(e) {
      return fallback;
    }
  };

  let loadedProducts = readSavedValue('products', []);
  if(!loadedProducts || loadedProducts.length === 0){
    loadedProducts = defaultProductsList;
  }

  state.products = loadedProducts.map(p => ({
    ...p,
    buyingPrice: p.buyingPrice ?? 0,
    sellingPrice: p.sellingPrice ?? (p.price || 0),
    image: p.image || ''
  }));
  
  state.products = sortProductsAlphabetically(state.products);
  
  state.orders = readSavedValue('orders', []);
  state.shopkeepers = readSavedValue('shopkeepers', []);
  state.routes = readSavedValue('routes', []);
  state.salesmen = readSavedValue('salesmen', []);
  state.ownerPin = readSavedValue('ownerPin', '1234');
  state.profile = readSavedValue('profile', { shopName:'', phone:'', routeId:'', salesmanId:'' });
  
  state.loading = false;
  render();
}

async function saveData(key, val, shared=true){
  localStorage.setItem(key, JSON.stringify(val));
  if(!shared) return;

  try {
    await fetch(GOOGLE_SHEET_WEB_APP_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({ action: "saveData", key: key, data: val })
    });
  } catch(e) {
    console.warn('Server sync error:', e);
  }
}

async function sendOrderToGoogleSheets(orderData) {
  if (!GOOGLE_SHEET_WEB_APP_URL) return;
  
  try {
    const sm = state.salesmen.find(s => s.id === orderData.salesmanId);
    const rt = state.routes.find(r => r.id === orderData.routeId);
    
    for(const item of orderData.items) {
      const payload = {
        action: "saveOrder",
        date: new Date(orderData.createdAt).toLocaleString(),
        orderId: orderData.id,
        shopName: orderData.shopName,
        phone: orderData.phone || '',
        route: rt ? rt.name : '',
        salesman: sm ? sm.name : '',
        productName: item.name,
        quantity: item.qty,
        unit: item.unit,
        unitPrice: item.price,
        totalPrice: item.price * item.qty,
        status: orderData.status
      };

      await fetch(GOOGLE_SHEET_WEB_APP_URL, {
        method: 'POST',
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });
    }
  } catch(err) {
    console.error("Google Sheets sync failed:", err);
  }
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2200);
}

function fmt(n){ return 'Rs ' + Number(n||0).toLocaleString('en-IN'); }

function cartTotal(){
  let total = 0;
  for(const pid in state.cart){
    const qty = state.cart[pid];
    const prod = state.products.find(x=>x.id===pid);
    if(prod && qty>0) total += (prod.sellingPrice || prod.price || 0) * qty;
  }
  return total;
}

function updateCartTotalDisplay(){
  const totalEl = document.getElementById('cartTotalDisplay');
  if(totalEl){
    totalEl.textContent = fmt(cartTotal());
  }
  if(state.view === 'salesman') {
    renderSalesmanCartReview();
  }
}

async function submitOrder(){
  const items = [];
  for(const pid in state.cart){
    const qty = state.cart[pid];
    const prod = state.products.find(x=>x.id===pid);
    if(prod && qty>0) {
      items.push({ 
        productId: prod.id, 
        name: prod.name, 
        unit: prod.unit, 
        buyingPrice: prod.buyingPrice || 0,
        price: prod.sellingPrice || prod.price || 0, 
        qty 
      });
    }
  }
  if(items.length===0){ showToast('پہلے کچھ آئٹمز منتخب کریں'); return; }
  if(!state.profile.shopName.trim()){ showToast('دکان کا نام منتخب یا درج کریں'); return; }

  const order = {
    id: uid(), 
    shopName: state.profile.shopName.trim(), 
    phone: state.profile.phone.trim(),
    routeId: state.profile.routeId || '',
    salesmanId: state.profile.salesmanId || '',
    items, 
    total: items.reduce((s,i)=> s + i.price*i.qty, 0),
    totalCost: items.reduce((s,i)=> s + i.buyingPrice*i.qty, 0),
    status: 'pending', 
    createdAt: Date.now(),
  };

  state.orders.unshift(order);
  await saveData('orders', state.orders, true);
  await saveData('profile', state.profile, false);
  
  sendOrderToGoogleSheets(order);

  state.cart = {};
  showToast('آرڈر کامیابی سے بھیج دیا گیا ✓');
  render();
}

async function updateOrderStatus(orderId, newStatus){
  const order = state.orders.find(o => o.id === orderId);
  if(order){
    order.status = newStatus;
    await saveData('orders', state.orders, true);
    showToast(`آرڈر کا اسٹیٹس "${newStatus === 'delivered' ? 'ڈیلیورڈ' : 'پینڈنگ'}" کر دیا گیا ہے ✓`);
    render();
  }
}

function render(){
  const app = document.getElementById('app');
  if(state.loading){ app.innerHTML = `<div class="empty">لوڈ ہو رہا ہے...</div>`; return; }

  let html = `
    <div class="signboard">
      <h1>حسن ٹریڈنگ کمپنی</h1>
      <p>اپنا آرڈر بک کریں • مالکان اور سیلز مین کے لیے مکمل سسٹم</p>

    <div class="tabs">
      <div class="tab ${state.view==='shop'?'active':''}" onclick="switchView('shop')">🛒 دکاندار</div>
      <div class="tab ${state.view==='salesman'?'active':''}" onclick="switchView('salesman')">👨‍💼 سیلز مین</div>
      <div class="tab ${state.view==='owner'?'active':''}" onclick="switchView('owner')">🔒 مالک (سیکیور)</div>

function switchView(v){
  if(v === 'owner' && !state.isOwnerAuthenticated){
    const inputPin = prompt("مالک کے صفحے کے لیے پن (PIN) درج کریں:");
    if(inputPin === state.ownerPin){
      state.isOwnerAuthenticated = true;
      state.view = v;
    } else {
      alert("غلط پن نمبر! آپ کی رسائی مسترد کر دی گئی ہے۔");
      return;
    }
  } else {
    state.view = v;
  }
  render();
}

function filterShopkeeperDropdown(query){
  state.searchShopkeeperDropdownQuery = query;
  const dropdown = document.getElementById('shopSelectDropdown');
  if(!dropdown) return;
  const options = dropdown.options;
  const q = query.toLowerCase().trim();
  for(let i = 0; i < options.length; i++){
    if(options[i].value === "") continue;
    const text = options[i].getAttribute('data-search') || '';
    options[i].style.display = text.includes(q) ? "" : "none";
  }
}

function filterShopProducts(query){
  state.searchProdQuery = query;
  const container = document.getElementById('shopProductsListContainer');
  if(!container) return;
  const rows = container.getElementsByClassName('prod-row');
  const q = query.toLowerCase().trim();
  for(let row of rows){
    const name = row.getAttribute('data-name') || '';
    row.style.display = name.includes(q) ? 'flex' : 'none';
  }
}

function onShopSelectChange(val){
  state.profile.shopName = val;
  const sk = state.shopkeepers.find(s=>s.name === val);
  if(sk){
    state.profile.phone = sk.phone || '';
    state.profile.routeId = sk.routeId || '';
  }
  render();
}

}

function renderSalesAnalytics(){
  const now = new Date();
  let filteredOrders = state.orders;

  if(state.selectedSalesmanFilter !== 'all'){
    filteredOrders = filteredOrders.filter(o => o.salesmanId === state.selectedSalesmanFilter);
  }

  if(state.salesTimeframe === 'daily'){
    filteredOrders = filteredOrders.filter(o => new Date(o.createdAt).toDateString() === now.toDateString());
  } else if(state.salesTimeframe === 'weekly'){
    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
    filteredOrders = filteredOrders.filter(o => new Date(o.createdAt) >= weekAgo);
  } else if(state.salesTimeframe === 'monthly'){
    filteredOrders = filteredOrders.filter(o => {
      const d = new Date(o.createdAt);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
  } else if(state.salesTimeframe === 'yearly'){
    filteredOrders = filteredOrders.filter(o => new Date(o.createdAt).getFullYear() === now.getFullYear());
  }

  const totalSales = filteredOrders.reduce((acc, o) => acc + o.total, 0);
  const totalCost = filteredOrders.reduce((acc, o) => {
    if(o.totalCost !== undefined) return acc + o.totalCost;
    let c = 0;
    (o.items||[]).forEach(it => {
      const p = state.products.find(prod=>prod.id===it.productId);
      c += (p ? p.buyingPrice : 0) * it.qty;
    });
    return acc + c;
  }, 0);
  const netProfit = totalSales - totalCost;

  return `
    <div class="ledger-card" id="salesReportPrintable">
      <div class="section-title">سیلز اور خالص منافع رپورٹ</div>
      
      <label>👨‍💼 سیلز مین کے لحاظ سے فلٹر کریں:</label>
      <select onchange="state.selectedSalesmanFilter=this.value; render();" style="margin-bottom:12px;">
        <option value="all" ${state.selectedSalesmanFilter==='all'?'selected':''}>-- تمام سیلز مین (All Salesmen) --</option>
        ${state.salesmen.map(sm=>`<option value="${sm.id}" ${state.selectedSalesmanFilter===sm.id?'selected':''}>${sm.name}</option>`).join('')}
      </select>

      <div class="tabs">
        <div class="tab ${state.salesTimeframe==='daily'?'active':''}" onclick="setSalesTimeframe('daily')">روزانہ</div>
        <div class="tab ${state.salesTimeframe==='weekly'?'active':''}" onclick="setSalesTimeframe('weekly')">ہفتہ وار</div>
        <div class="tab ${state.salesTimeframe==='monthly'?'active':''}" onclick="setSalesTimeframe('monthly')">ماہانہ</div>
        <div class="tab ${state.salesTimeframe==='yearly'?'active':''}" onclick="setSalesTimeframe('yearly')">سالانہ</div>
      </div>
      <div class="summary-grid">
        <div class="summary-box">
          <div class="num">${filteredOrders.length}</div>
          <div class="lbl">کل آرڈرز</div>
        </div>
        <div class="summary-box">
          <div class="num">${fmt(totalSales)}</div>
          <div class="lbl">مجموعی سیلز</div>
        </div>
        <div class="summary-box" style="background:#E8F0EA;">
          <div class="num" style="color:var(--green-dark);">${fmt(netProfit)}</div>
          <div class="lbl">خالص منافع (Profit)</div>
        </div>
      </div>

      <div class="export-btns">
        <button class="btn btn-excel btn-sm" onclick="exportSalesToExcel()">📊 Excel ڈاؤن لوڈ کریں</button>
        <button class="btn btn-pdf btn-sm" onclick="exportSalesToPDF()">📄 PDF ڈاؤن لوڈ کریں</button>
      </div>
    </div>
  `;
}

function exportSalesToExcel(){
  if(state.orders.length === 0){ showToast('کوئی آرڈر ڈیٹا موجود نہیں'); return; }
  const data = [];
  state.orders.forEach(o => {
    const sm = state.salesmen.find(s => s.id === o.salesmanId);
    const rt = state.routes.find(r => r.id === o.routeId);
    (o.items||[]).forEach(it => {
      data.push({
        'تاریخ': new Date(o.createdAt).toLocaleDateString('en-GB'),
        'آرڈر ID': o.id,
        'دکان کا نام': o.shopName,
        'فون نمبر': o.phone || '',
        'روٹ': rt ? rt.name : '',
        'سیلز مین': sm ? sm.name : '',
        'پروڈکٹ': it.name,
        'تعداد': it.qty,
        'یونٹ': it.unit,
        'فی قیمت': it.price,
        'کل رقم': it.price * it.qty,
        'خریداری لاگت': (it.buyingPrice || 0) * it.qty,
        'منافع': (it.price - (it.buyingPrice || 0)) * it.qty,
        'اسٹیٹس': o.status
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sales Report");
  XLSX.writeFile(wb, `Hassan_Trading_Sales_${Date.now()}.xlsx`);
  showToast('Excel فائل ڈاؤن لوڈ ہو گئی ✓');
}

function exportSalesToPDF(){
  const element = document.getElementById('salesReportPrintable');
  if(!element){ showToast('رپورٹ نہیں مل سکی'); return; }
  const opt = {
    margin: 0.5, filename: `Sales_Report_${Date.now()}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(element).save();
  showToast('PDF فائل ڈاؤن لوڈ ہو رہی ہے... ✓');
}

      <label>پروڈکٹ کی تصویر منتخب کریں:</label>
      <input type="file" id="npImage" accept="image/*" onchange="handleImageUpload(event, 'new')">
      ${state.newProdBase64 ? `<img src="${state.newProdBase64}" class="preview-img">` : ''}

      <button class="btn btn-primary btn-block" style="margin-top:10px;" onclick="addProduct()">ایڈ کریں</button>
    </div>
    
    <div class="ledger-card">
      <div class="section-title">موجودہ پروڈکٹس (${state.products.length})</div>
      <input type="text" class="search-box" placeholder="🔍 پروڈکٹ تلاش کریں..." value="${state.searchOwnerProdQuery}" oninput="filterOwnerProducts(this.value)">
      <div id="ownerProductsListContainer">

      ${state.products.length === 0 ? '<div class="empty">ابھی کوئی پروڈکٹ ایڈ نہیں ہے۔ اوپر فارم سے ایڈ کریں۔</div>' : ''}

      ${state.products.map(p => {
        const isEditing = state.editingProductId === p.id;
        const bPrice = p.buyingPrice || 0;
        const sPrice = p.sellingPrice || p.price || 0;
        const profit = sPrice - bPrice;
        const placeholderImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 24 24' fill='none' stroke='%238A8370' stroke-width='1.5'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='8.5' cy='8.5' r='1.5'/><path d='M21 15l-5-5L5 21'/></svg>";
        const isVisible = p.name.toLowerCase().includes(state.searchOwnerProdQuery.toLowerCase());

        return `
        <div class="prod-row owner-prod-row" data-name="${p.name.toLowerCase()}" style="flex-direction:column; align-items:stretch; display:${isVisible ? 'flex' : 'none'};">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
            <img src="${p.image || placeholderImg}" class="prod-img" alt="${p.name}">
            <div class="prod-name">
              <b>${p.name}</b> <span class="u">(${p.unit})</span>
              <div class="price-details">خرید: ${fmt(bPrice)} | فروخت: ${fmt(sPrice)}</div>
              <div class="profit-badge">خالص منافع: ${fmt(profit)}</div>
            </div>
            <div style="display:flex; gap:4px; flex-direction:column;">
              <button class="btn btn-mustard btn-sm" onclick="toggleEditProduct('${p.id}')">${isEditing ? 'بند کریں' : 'ایڈٹ'}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">حذف</button>
            </div>
          </div>
          
          ${isEditing ? `
            <div class="edit-box">
              <label>پروڈکٹ کا نام:</label>
              <input type="text" id="editName_${p.id}" value="${p.name}">
              
              <label>یونٹ:</label>
              <input type="text" id="editUnit_${p.id}" value="${p.unit}">
              
              <div class="row">
                <div>
                  <label>خریداری قیمت (Rs):</label>
                  <input type="number" id="editBuyingPrice_${p.id}" value="${bPrice}">
                </div>
                <div>
                  <label>فروخت قیمت (Rs):</label>
                  <input type="number" id="editSellingPrice_${p.id}" value="${sPrice}">
                </div>
              </div>

              <label>تصویر تبدیل کریں:</label>
              <input type="file" accept="image/*" onchange="handleImageUpload(event, '${p.id}')">
              <img src="${state.editProdBase64[p.id] || p.image || placeholderImg}" class="preview-img">

              <button class="btn btn-primary btn-block btn-sm" style="margin-top:10px;" onclick="saveEditedProduct('${p.id}')">محفوظ کریں ✓</button>
            </div>
          ` : ''}
        </div>
      `;
      }).join('')}
      </div>
    </div>
  `;
}

function filterOwnerProducts(query){
  state.searchOwnerProdQuery = query;
  const container = document.getElementById('ownerProductsListContainer');
  if(!container) return;
  const rows = container.getElementsByClassName('owner-prod-row');
  const q = query.toLowerCase().trim();
  for(let row of rows){
    const name = row.getAttribute('data-name') || '';
    row.style.display = name.includes(q) ? 'flex' : 'none';
  }
}

function handleImageUpload(e, type){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    if(type === 'new'){
      state.newProdBase64 = event.target.result;
    } else {
      state.editProdBase64[type] = event.target.result;
    }
    render();
  };
  reader.readAsDataURL(file);
}

/* Orders Tab */
function renderOrdersTab(){
  let displayOrders = state.orders;
  if(state.selectedSalesmanFilter !== 'all'){
    displayOrders = displayOrders.filter(o => o.salesmanId === state.selectedSalesmanFilter);
  }

  return `
    <div class="ledger-card">
      <div class="section-title">تمام آرڈرز ریکارڈ</div>
      
      <label>👨‍💼 سیلز مین فلٹر:</label>
      <select onchange="state.selectedSalesmanFilter=this.value; render();" style="margin-bottom:12px;">
        <option value="all" ${state.selectedSalesmanFilter==='all'?'selected':''}>-- تمام سیلز مین (All Salesmen) --</option>
        ${state.salesmen.map(sm=>`<option value="${sm.id}" ${state.selectedSalesmanFilter===sm.id?'selected':''}>${sm.name}</option>`).join('')}
      </select>

      <div class="export-btns" style="margin-bottom:12px;">
        <button class="btn btn-excel btn-sm" onclick="exportSalesToExcel()">📊 تمام آرڈرز Excel فائل میں حاصل کریں</button>
      </div>

      ${displayOrders.length === 0 ? '<div class="empty">کوئی آرڈر نہیں ملا۔</div>' : ''}

      ${displayOrders.map(o => {
        const sm = state.salesmen.find(s => s.id === o.salesmanId);
        const isDelivered = o.status === 'delivered';

        return `
        <div class="order-card">
          <div class="order-top">
            <div class="shop-name">${o.shopName} ${sm ? `<small style="color:var(--muted); font-weight:normal;">(سیلز مین: ${sm.name})</small>` : ''}</div>
            <div class="badge ${isDelivered ? 'delivered' : 'pending'}">${isDelivered ? 'ڈلیورڈ (Delivered)' : 'پینڈنگ (Pending)'}</div>
          </div>
          <div class="item-list">
            ${o.items.map(it => `<div class="it"><span>${it.name} × ${it.qty}</span><b>${fmt(it.price * it.qty)}</b></div>`).join('')}
          </div>
          <div class="order-total"><span>ٹوٹل</span><span class="amt">${fmt(o.total)}</span></div>
          
          <div style="margin-top:10px; display:flex; gap:8px;">
            <button class="btn btn-sm ${isDelivered ? 'btn-ghost' : 'btn-primary'}" onclick="updateOrderStatus('${o.id}', 'delivered')">
              🚚 Delivered مارک کریں
            </button>
            <button class="btn btn-sm ${!isDelivered ? 'btn-ghost' : 'btn-mustard'}" onclick="updateOrderStatus('${o.id}', 'pending')">
              ⏳ Pending مارک کریں
            </button>
          </div>
        </div>
      `;
      }).join('')}
    </div>
  `;
}

function renderSettingsTab(){
  return `
    <div class="ledger-card">
      <div class="section-title">پاسورڈ (PIN) تبدیل کریں</div>
      <label>موجودہ پاسورڈ (PIN)</label>
      <input type="password" id="oldPin" placeholder="موجودہ پن">
      <label>نیا پاسورڈ (PIN)</label>
      <input type="password" id="newPin" placeholder="نیا پن">
      <button class="btn btn-primary btn-block" onclick="updateOwnerPin()">پاسورڈ اپڈیٹ کریں</button>
    </div>
  `;
}

window.setSalesTimeframe = (t) => { state.salesTimeframe = t; render(); };
window.setOwnerTab = (t) => { state.ownerTab = t; render(); };
window.openShopSheet = (name) => { state.selectedShopForSheet = name; render(); };
window.setRouteFilter = (routeId) => { state.selectedRouteFilter = routeId; render(); };

window.changeQty = (pid, delta) => {
  state.cart[pid] = Math.max(0, (state.cart[pid] || 0) + delta);
  const qtyInput = document.getElementById(`qty_${pid}`);
  if(qtyInput) qtyInput.value = state.cart[pid];
  updateCartTotalDisplay();
};

window.setQty = (pid, val) => {
  state.cart[pid] = Math.max(0, parseInt(val) || 0);
  updateCartTotalDisplay();
};

window.toggleEditProduct = (id) => {
  state.editingProductId = (state.editingProductId === id) ? null : id;
  render();
};

window.saveEditedProduct = async (id) => {
  const newName = document.getElementById(`editName_${id}`).value.trim();
  const newUnit = document.getElementById(`editUnit_${id}`).value.trim();
  const newBuyingPrice = Number(document.getElementById(`editBuyingPrice_${id}`).value);
  const newSellingPrice = Number(document.getElementById(`editSellingPrice_${id}`).value);

  if(!newName){ showToast('نام درج کرنا ضروری ہے'); return; }

  const prod = state.products.find(p => p.id === id);
  if(prod){
    prod.name = newName;
    prod.unit = newUnit || 'پیس';
    prod.buyingPrice = isNaN(newBuyingPrice) ? 0 : newBuyingPrice;
    prod.sellingPrice = isNaN(newSellingPrice) ? 0 : newSellingPrice;
    prod.price = prod.sellingPrice;

    if(state.editProdBase64[id]){
      prod.image = state.editProdBase64[id];
    }
    state.products = sortProductsAlphabetically(state.products);
    await saveData('products', state.products, true);
    state.editingProductId = null;
    showToast('پروڈکٹ کامیابی سے اپڈیٹ ہو گئی ✓');
    render();
  }
};

async function updateOwnerPin(){
  const oldPin = document.getElementById('oldPin').value;
  const newPin = document.getElementById('newPin').value.trim();

  if(oldPin !== state.ownerPin){ showToast('موجودہ پاسورڈ غلط ہے!'); return; }
  if(!newPin){ showToast('نیا پاسورڈ درج کریں'); return; }

  state.ownerPin = newPin;
  await saveData('ownerPin', state.ownerPin, true);
  showToast('پاسورڈ کامیابی سے تبدیل ہو گیا ✓');
  document.getElementById('oldPin').value = '';
  document.getElementById('newPin').value = '';
}

async function addSalesman(){
  const name = document.getElementById('smName').value.trim();
  const phone = document.getElementById('smPhone').value.trim();
  const routeId = document.getElementById('smRoute').value;

  if(!name){ return showToast('سیلز مین کا نام ضروری ہے'); }
  state.salesmen.push({ id: uid(), name, phone, routeId });
  await saveData('salesmen', state.salesmen, true);
  showToast('سیلز مین شامل کر لیا گیا ✓');
  render();
}

async function addRoute(nameInputId, scheduleInputId){
  const name = document.getElementById(nameInputId).value.trim();
  const schedule = document.getElementById(scheduleInputId).value.trim();

  if(!name) return showToast('روٹ کا نام ضروری ہے');
  state.routes.push({ id: uid(), name, schedule });
  await saveData('routes', state.routes, true);
  showToast('روٹ اور شیڈول محفوظ ہو گیا ✓');
  render();
}

async function addShopkeeper(nameId, phoneId, routeSelectId){
  const name = document.getElementById(nameId).value.trim();
  const phone = document.getElementById(phoneId).value.trim();
  const routeId = document.getElementById(routeSelectId).value;

  if(!name) return showToast('دکان کا نام درج کریں');
  if(!routeId) return showToast('روٹ منتخب کرنا ضروری ہے');

  state.shopkeepers.push({ id: uid(), name, phone, routeId });
  await saveData('shopkeepers', state.shopkeepers, true);
  showToast('دکاندار شامل کر لیا گیا ✓');
  render();
}

async function addProduct(){
  const name = document.getElementById('npName').value.trim();
  const unit = document.getElementById('npUnit').value.trim();
  const buyingPrice = Number(document.getElementById('npBuyingPrice').value) || 0;
  const sellingPrice = Number(document.getElementById('npSellingPrice').value) || 0;
  
  if(!name) return showToast('نام درج کرنا ضروری ہے');
  const newId = (state.products.length + 1).toString();
  
  state.products.push({ 
    id: newId, name, unit: unit || 'پیس', buyingPrice, sellingPrice,
    price: sellingPrice, image: state.newProdBase64 || ''
  });

  state.products = sortProductsAlphabetically(state.products);
  await saveData('products', state.products, true);
  state.newProdBase64 = '';
  showToast('پروڈکٹ شامل ہو گئی ✓');
  render();
}

async function deleteProduct(id){
  if(confirm('کیا آپ واقعتاً اس پروڈکٹ کو حذف کرنا چاہتے ہیں؟')){
    state.products = state.products.filter(p => p.id !== id);
    await saveData('products', state.products, true);
    showToast('پروڈکٹ حذف کر دی گئی');
    render();
  }
}

loadAll();
</script>
</body>
</html>
